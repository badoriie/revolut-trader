repos:
  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-ast
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'int', '--branch', 'dev']
      - id: detect-private-key
        exclude: ^(tests/mocks/|docs/)

  # Ruff - linting and formatting (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      # Linter — auto-fix, same as `make format`
      - id: ruff
        args: [--fix]
      # Formatter
      - id: ruff-format

  # Type checking with pyright
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        args: [src/, cli/]
        language: system
        types: [python]
        pass_filenames: false

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-r', 'src/', 'cli/']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Markdown formatting
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-black

  # Run tests before commit
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        args: [tests/, --tb=short, -q, --cov=src, --cov-fail-under=97]
        language: system
        pass_filenames: false
        always_run: true
