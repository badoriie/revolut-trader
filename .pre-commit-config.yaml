repos:
  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^CHANGELOG\.md$
      - id: end-of-file-fixer
        exclude: ^CHANGELOG\.md$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-ast
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: detect-private-key
        exclude: ^(tests/mocks/|docs/)

  # Ruff — uses the same local installation as `make format` and `make lint`
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        args: [src/, tests/, cli/]
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        args: [src/, tests/, cli/]
        language: system
        types: [python]
        pass_filenames: false

  # Type checking — same as `make typecheck`
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        args: [src/, cli/]
        language: system
        types: [python]
        pass_filenames: false

  # Security — same as `make lint` (bandit reads config from pyproject.toml)
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: uv run bandit
        args: ['-c', 'pyproject.toml', '-r', 'src/', 'cli/']
        language: system
        types: [python]
        pass_filenames: false

  # Tests — same as `make test`
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        args: [tests/, --tb=short, -q, --cov=src, --cov-report=term-missing]
        language: system
        pass_filenames: false
        always_run: true

  # Commit message — enforces Conventional Commits format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
