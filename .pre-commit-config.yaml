fail_fast: true

repos:
  # ============================================================================
  # STAGE 1: FAST CHECKS
  # Run first - if these fail, nothing else runs
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^CHANGELOG\.md$
      - id: end-of-file-fixer
        exclude: ^CHANGELOG\.md$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-ast
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: detect-private-key
        exclude: ^(tests/mocks/|docs/)

  # ============================================================================
  # STAGE 2: CODE QUALITY (Ruff)
  # Runs ONLY if Stage 1 passes
  # ============================================================================
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        args: [src/, tests/, cli/]
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        args: [src/, tests/, cli/]
        language: system
        types: [python]
        pass_filenames: false

  # ============================================================================
  # STAGE 3: TYPE CHECKING
  # Runs ONLY if Stage 1 + Stage 2 pass
  # ============================================================================
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        args: [src/, cli/]
        language: system
        types: [python]
        pass_filenames: false

  # ============================================================================
  # STAGE 4: SECURITY SCAN
  # Runs ONLY if Stage 1 + Stage 2 + Stage 3 pass
  # ============================================================================
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: uv run bandit
        args: ['-c', 'pyproject.toml', '-r', 'src/', 'cli/']
        language: system
        types: [python]
        pass_filenames: false

      - id: deps-audit
        name: dependency vulnerability audit
        entry: bash .claude/hooks/deps-audit.sh --check
        language: system
        pass_filenames: false
        always_run: true

  # ============================================================================
  # STAGE 5: TESTS
  # Runs ONLY if ALL above stages pass (1+2+3+4)
  # This is the slowest check, so it runs last to save time on failures
  # ============================================================================
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        args: [tests/, --tb=short, -q, --cov=src, --cov-report=term-missing]
        language: system
        pass_filenames: false

  # ============================================================================
  # COMMIT MESSAGE VALIDATION
  # Runs in separate stage (commit-msg), not affected by above
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
