[project]
name = "revolut-trader"
version = "0.1.0"
description = "Professional algorithmic trading bot for Revolut Crypto API"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "cryptography>=42.0.0",
    "loguru>=0.7.0",
    "sqlalchemy>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.6.0",
    "mypy>=1.8.0",
    "pre-commit>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
# Balanced type checking - strict where it matters, practical where it doesn't
warn_return_any = false  # Too noisy for practical development
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = false  # Allow unused ignores for compatibility
warn_no_return = true
warn_unreachable = true
# Core type checking
disallow_untyped_defs = false  # Allow gradual typing
disallow_incomplete_defs = false  # Allow gradual typing
check_untyped_defs = true
disallow_untyped_calls = false  # Too strict for external libraries
# Type checking improvements
no_implicit_optional = true
strict_optional = false  # Allow None without explicit Optional checks
strict_equality = true
# Error reporting
show_error_codes = true
show_column_numbers = true
pretty = true

# Strict mode for core trading strategies and risk management only
[[tool.mypy.overrides]]
module = ["src.strategies.*", "src.risk_management.*", "src.utils.indicators"]
disallow_untyped_defs = true
disallow_incomplete_defs = true
strict_optional = true

# Relax even more for CLI tools and infrastructure
[[tool.mypy.overrides]]
module = ["cli.*", "src.notifications.*", "src.backtest.*"]
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
strict_optional = false

# Ignore missing stubs for visualization and external libraries
[[tool.mypy.overrides]]
module = [
    "loguru",
    "httpx",
    "cryptography.*",
    "sqlalchemy",
    "sqlalchemy.*",
]
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv"]
skips = [
    "B101",  # Skip assert_used check (common in tests)
    "B404",  # Import subprocess - safe usage for 1Password CLI
    "B603",  # Subprocess without shell - safe, using list arguments
    "B607",  # Partial executable path - safe, using op CLI tool
]
