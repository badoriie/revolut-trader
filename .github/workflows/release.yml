name: Release (Prod)

# Manual workflow to validate and release a production version from main.
# Commitizen determines the next semver from conventional commits since the last
# tag, updates pyproject.toml, generates CHANGELOG.md incrementally, creates the
# git tag, and publishes a GitHub Release — all atomically.
#
# Workflow order:
#   validate-inputs → check-version-bump → [lint, typecheck, security, test, build-revt] → release
#
# The revt binaries are built in parallel with CI checks (from the current HEAD
# of main), uploaded as workflow artifacts, then attached directly to the GitHub
# Release in a single gh release create call — avoiding immutability issues.
#
# Use the `increment` input to force a specific bump type when the commit history
# contains no conventional commits of the required type (e.g. only `chore:` fixes
# that need a patch release, or a first release after migrating to Conventional Commits).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'I UNDERSTAND' to confirm production release"
        required: true
        type: string
      increment:
        description: "Force a bump type (leave blank to auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

concurrency:
  group: release-prod
  cancel-in-progress: false

env:
  ENVIRONMENT: prod
  PYTHON_VERSION: "3.11"

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'I UNDERSTAND'
        run: |
          echo "::error::You must type 'I UNDERSTAND' to confirm production release."
          exit 1

  # Dry-runs the version bump to verify there are releasable conventional commits
  # before the expensive CI jobs start. Always runs (no top-level `if:`) so it can
  # safely appear in `needs:` of the parallel CI jobs.
  #
  # The computed next version is exposed as an output so build-revt can apply it
  # to pyproject.toml before running PyInstaller — ensuring the baked-in version
  # inside the binary matches the release tag it is attached to.
  check-version-bump:
    name: Check Version Bump
    needs: validate-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_version: ${{ steps.compute.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Dry-run version bump
        id: compute
        run: |
          INCREMENT="${{ inputs.increment }}"
          if [ -n "$INCREMENT" ]; then
            BUMP_ARGS="--increment $(echo "$INCREMENT" | tr '[:lower:]' '[:upper:]')"
          else
            BUMP_ARGS=""
          fi

          # shellcheck disable=SC2086
          OUTPUT=$(uv run cz bump --dry-run --yes $BUMP_ARGS 2>&1) || {
            echo "::error::commitizen could not determine a next version."
            echo "::error::Ensure commits since the last tag follow Conventional Commits, or use the 'increment' input to force a bump type."
            exit 1
          }

          echo "$OUTPUT"

          # Extract the computed next version from commitizen output.
          # Commitizen prints a line like: "bump: version 0.8.0 -> 0.9.0"
          NEW_VERSION=$(echo "$OUTPUT" | awk '/bump: version/ {print $NF}')
          if [ -z "$NEW_VERSION" ]; then
            echo "::error::Could not extract new version from commitizen output."
            exit 1
          fi
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed next version: $NEW_VERSION"

          echo "### Version bump preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint & Format
    needs: check-version-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/ cli/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ cli/

  typecheck:
    name: Type Check
    needs: check-version-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Pyright
        run: uv run pyright src/ cli/

  security:
    name: Security Scan
    needs: check-version-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src/ cli/

  test:
    name: Tests (prod)
    needs: check-version-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          -q

  # Builds run in parallel with CI checks — no dependency on the release tag.
  # Binaries are stored as workflow artifacts and attached to the release later.
  build-revt:
    name: Build revt binary (${{ matrix.artifact }})
    needs: check-version-bump
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ARM64 ──────────────────────────────────────────────────────
          - os: ubuntu-24.04-arm  # Raspberry Pi 4+ / AWS Graviton / ARM servers
            artifact: revt-linux-arm64
          # ── Linux x86_64 ─────────────────────────────────────────────────────
          - os: ubuntu-latest     # Standard x86_64 Linux servers / desktops
            artifact: revt-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Pin pyproject.toml version for build
        # The binary is built before `cz bump` runs in the release job, so the
        # checkout has the old version. Patch it here (no commit — fresh checkout)
        # then re-sync so copy_metadata("revolut-trader") bakes the correct version
        # into the frozen binary instead of the pre-bump version.
        run: |
          NEW="${{ needs.check-version-bump.outputs.new_version }}"
          test -n "$NEW" || { echo "::error::new_version output is empty"; exit 1; }
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"$NEW\"/" pyproject.toml
          grep "^version = " pyproject.toml   # confirm the sed worked
          uv sync --extra dev                 # rebuild metadata to match new version

      - name: Build standalone binary
        run: |
          uv run pyinstaller build/revt.spec \
            --distpath dist \
            --workpath build/.pyinstaller \
            --noconfirm

      - name: Verify baked-in version matches release tag
        run: |
          EXPECTED="${{ needs.check-version-bump.outputs.new_version }}"
          REPORTED=$(dist/revt --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ "$REPORTED" != "$EXPECTED" ]; then
            echo "::error::Binary reports version '$REPORTED' but expected '$EXPECTED'."
            echo "::error::The copy_metadata step may not have picked up the new version."
            exit 1
          fi
          echo "✓ Binary version $REPORTED matches release tag $EXPECTED"

      - name: Rename binary to include platform suffix
        shell: bash
        run: mv dist/revt "dist/${{ matrix.artifact }}"

      - name: Store binary as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create Release
    needs: [lint, typecheck, security, test, build-revt]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, generate changelog, and tag
        id: bump
        run: |
          INCREMENT="${{ inputs.increment }}"
          if [ -n "$INCREMENT" ]; then
            BUMP_ARGS="--increment $(echo "$INCREMENT" | tr '[:lower:]' '[:upper:]')"
          else
            BUMP_ARGS=""
          fi

          # --changelog: write the new section to CHANGELOG.md (incremental)
          # --yes: skip interactive prompts
          # --no-verify: bypass commit-msg hook — bot commit format doesn't follow
          #              Conventional Commits and would fail our own hook
          # shellcheck disable=SC2086
          uv run cz bump --changelog --yes --no-verify $BUMP_ARGS

          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Update uv.lock for new version
        run: |
          # Regenerate lockfile to match the new pyproject.toml version
          uv lock

          # Check if uv.lock was modified
          if git diff --quiet uv.lock; then
            echo "uv.lock unchanged"
          else
            echo "uv.lock updated for new version"
            git add uv.lock
            git commit -m "chore: update uv.lock for ${{ steps.bump.outputs.tag }}" --no-verify
          fi

      - name: Push commit and tag to main
        run: |
          git push origin main
          git push origin "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Extract from the first ## heading to (not including) the second ## heading.
          # Works for both the new commitizen format and the old GitHub-notes format.
          awk '/^## /{if(found) exit; found=1} found{print}' CHANGELOG.md > release_notes.md
          echo "--- release notes ---"
          cat release_notes.md

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/revt-linux-arm64
            dist/revt-linux-x86_64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file release_notes.md \
            --latest \
            dist/revt-linux-arm64 \
            dist/revt-linux-x86_64

      - name: Post release summary
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          {
            echo "## Production Release $TAG"
            echo ""
            echo "All checks passed:"
            echo "- Lint & Format"
            echo "- Type Check"
            echo "- Security Scan"
            echo "- Tests (prod, ≥97% coverage)"
            echo "- Artifact Attestations Generated"
            echo ""
            echo "**Tag:** \`$TAG\`"
            echo "**Release:** [${TAG}](../../releases/tag/${TAG})"
            echo ""
            echo "### Artifact Attestations"
            echo ""
            echo "All release binaries include build provenance attestations that can be verified using:"
            echo '```bash'
            echo "gh attestation verify <artifact> --owner badoriie"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
