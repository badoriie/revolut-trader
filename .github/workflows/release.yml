name: Release (Prod)

# Manual workflow to validate and release a production version from main.
# Commitizen determines the next semver from conventional commits since the last
# tag, updates pyproject.toml, generates CHANGELOG.md incrementally, creates the
# git tag, and publishes a GitHub Release — all atomically.
#
# Workflow order:
#   validate-inputs → check-version-bump → [lint, typecheck, security, test, build-revt] → release
#
# The revt binaries are built in parallel with CI checks (from the current HEAD
# of main), uploaded as workflow artifacts, then attached directly to the GitHub
# Release in a single gh release create call — avoiding immutability issues.
#
# Use the `increment` input to force a specific bump type when the commit history
# contains no conventional commits of the required type (e.g. only `chore:` fixes
# that need a patch release, or a first release after migrating to Conventional Commits).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'I UNDERSTAND' to confirm production release"
        required: true
        type: string
      increment:
        description: "Force a bump type (leave blank to auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-prod
  cancel-in-progress: false

env:
  ENVIRONMENT: prod
  PYTHON_VERSION: "3.11"

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'I UNDERSTAND'
        run: |
          echo "::error::You must type 'I UNDERSTAND' to confirm production release."
          exit 1

  # Dry-runs the version bump to verify there are releasable conventional commits
  # before the expensive CI jobs start. Always runs (no top-level `if:`) so it can
  # safely appear in `needs:` of the parallel CI jobs.
  check-version-bump:
    name: Check Version Bump
    needs: validate-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Dry-run version bump
        run: |
          INCREMENT="${{ inputs.increment }}"
          if [ -n "$INCREMENT" ]; then
            BUMP_ARGS="--increment $(echo "$INCREMENT" | tr '[:lower:]' '[:upper:]')"
          else
            BUMP_ARGS=""
          fi

          # shellcheck disable=SC2086
          OUTPUT=$(uv run cz bump --dry-run --yes $BUMP_ARGS 2>&1) || {
            echo "::error::commitizen could not determine a next version."
            echo "::error::Ensure commits since the last tag follow Conventional Commits, or use the 'increment' input to force a bump type."
            exit 1
          }

          echo "$OUTPUT"
          echo "### Version bump preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint & Format
    needs: check-version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/ cli/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ cli/

  typecheck:
    name: Type Check
    needs: check-version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Pyright
        run: uv run pyright src/ cli/

  security:
    name: Security Scan
    needs: check-version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src/ cli/

  test:
    name: Tests (prod)
    needs: check-version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          -q

  # Builds run in parallel with CI checks — no dependency on the release tag.
  # Binaries are stored as workflow artifacts and attached to the release later.
  build-revt:
    name: Build revt binary (${{ matrix.artifact }})
    needs: check-version-bump
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ARM64 ──────────────────────────────────────────────────────
          - os: ubuntu-24.04-arm  # Raspberry Pi 4+ / AWS Graviton / ARM servers
            artifact: revt-linux-arm64
          # ── Linux x86_64 ─────────────────────────────────────────────────────
          - os: ubuntu-latest     # Standard x86_64 Linux servers / desktops
            artifact: revt-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Build standalone binary
        run: |
          uv run pyinstaller build/revt.spec \
            --distpath dist \
            --workpath build/.pyinstaller \
            --noconfirm

      - name: Rename binary to include platform suffix
        shell: bash
        run: mv dist/revt "dist/${{ matrix.artifact }}"

      - name: Store binary as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create Release
    needs: [lint, typecheck, security, test, build-revt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, generate changelog, and tag
        id: bump
        run: |
          INCREMENT="${{ inputs.increment }}"
          if [ -n "$INCREMENT" ]; then
            BUMP_ARGS="--increment $(echo "$INCREMENT" | tr '[:lower:]' '[:upper:]')"
          else
            BUMP_ARGS=""
          fi

          # --changelog: write the new section to CHANGELOG.md (incremental)
          # --yes: skip interactive prompts
          # --no-verify: bypass commit-msg hook — bot commit format doesn't follow
          #              Conventional Commits and would fail our own hook
          # shellcheck disable=SC2086
          uv run cz bump --changelog --yes --no-verify $BUMP_ARGS

          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag to main
        run: |
          git push origin main
          git push origin "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Extract from the first ## heading to (not including) the second ## heading.
          # Works for both the new commitizen format and the old GitHub-notes format.
          awk '/^## /{if(found) exit; found=1} found{print}' CHANGELOG.md > release_notes.md
          echo "--- release notes ---"
          cat release_notes.md

      - name: Download binaries
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file release_notes.md \
            --latest \
            dist/revt-linux-arm64 \
            dist/revt-linux-x86_64

      - name: Post release summary
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          {
            echo "## Production Release $TAG"
            echo ""
            echo "All checks passed:"
            echo "- Lint & Format"
            echo "- Type Check"
            echo "- Security Scan"
            echo "- Tests (prod, ≥97% coverage)"
            echo ""
            echo "**Tag:** \`$TAG\`"
            echo "**Release:** [${TAG}](../../releases/tag/${TAG})"
          } >> "$GITHUB_STEP_SUMMARY"
