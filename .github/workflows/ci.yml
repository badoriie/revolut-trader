name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  ENVIRONMENT: int
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/ cli/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ cli/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Pyright
        run: uv run pyright src/ cli/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src/ cli/

  test:
    name: Tests (int)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=97
          -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  ci-passed:
    name: CI Passed
    if: always()
    needs: [lint, typecheck, security, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.security.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
