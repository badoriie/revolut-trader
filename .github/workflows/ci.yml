name: CI

on:
  push:
    branches: [dev, int, main]
  pull_request:
    branches: [dev, int, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Map branch to environment: dev→dev, int→int, main→prod
  # For PRs, use the target branch; for pushes, use the current branch.
  ENVIRONMENT: >-
    ${{
      (github.base_ref || github.ref_name) == 'main' && 'prod' ||
      (github.base_ref || github.ref_name) == 'int' && 'int' ||
      'dev'
    }}
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/ cli/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ cli/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Pyright
        run: uv run pyright src/ cli/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src/ cli/

  test:
    name: Tests (${{ github.base_ref || github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=97
          -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
