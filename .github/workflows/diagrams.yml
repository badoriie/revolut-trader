name: Generate Architecture Diagrams

on:
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  diagrams:
    name: Generate Class Diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate class diagrams (pyreverse)
        run: |
          mkdir -p docs/diagrams
          uv run pyreverse \
            --output svg \
            --output-directory docs/diagrams \
            --project revolut-trader \
            --ignore __pycache__ \
            src/

      - name: Upload diagrams as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: architecture-diagrams-${{ github.sha }}
          path: docs/diagrams/
          retention-days: 90
