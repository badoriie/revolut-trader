name: Backtest Matrix

# Manual workflow — configure parameters from the Actions console.
# Uses ENVIRONMENT=int with real Revolut X API for actual market data.
#
# Required GitHub secret:
#   OP_SERVICE_ACCOUNT_TOKEN — 1Password service account token with read access
#                              to the revolut-trader vault (int credentials).

on:
  workflow_dispatch:
    inputs:
      strategies:
        description: "Strategies to compare (comma-separated, or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - market_making
          - momentum
          - mean_reversion
          - multi_strategy
          - breakout
          - range_reversion
      risk_levels:
        description: "Risk levels to test"
        required: false
        default: "conservative,moderate,aggressive"
        type: choice
        options:
          - conservative,moderate,aggressive
          - conservative
          - moderate
          - aggressive
      days:
        description: "Days of historical data"
        required: false
        default: "30"
        type: choice
        options:
          - "7"
          - "14"
          - "30"
          - "60"
          - "90"
      interval:
        description: "Candle interval (minutes)"
        required: false
        default: "60"
        type: choice
        options:
          - "1"
          - "5"
          - "15"
          - "30"
          - "60"
          - "240"
          - "1440"
          - "2880"
          - "5760"
          - "10080"
          - "20160"
          - "40320"
      pairs:
        description: "Trading pairs (comma-separated)"
        required: false
        default: "BTC-EUR,ETH-EUR"
        type: string
      capital:
        description: "Initial capital in EUR"
        required: false
        default: "10000"
        type: string
      log_level:
        description: "Logging level"
        required: false
        default: "WARNING"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

permissions:
  contents: read

env:
  ENVIRONMENT: int
  PYTHON_VERSION: "3.11"

jobs:
  backtest-matrix:
    name: Backtest Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install 1Password CLI
        run: |
          curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
            sudo gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" | \
            sudo tee /etc/apt/sources.list.d/1password.list
          sudo apt-get update -qq && sudo apt-get install -y -qq 1password-cli

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Build strategy arguments
        id: args
        run: |
          STRATEGIES="${{ inputs.strategies }}"
          if [ "$STRATEGIES" = "all" ] || [ -z "$STRATEGIES" ]; then
            echo "strategies_arg=" >> "$GITHUB_OUTPUT"
          else
            echo "strategies_arg=--strategies $STRATEGIES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run backtest matrix
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          uv run python cli/backtest_compare.py \
            ${{ steps.args.outputs.strategies_arg }} \
            --days ${{ inputs.days || '30' }} \
            --interval ${{ inputs.interval || '60' }} \
            --pairs ${{ inputs.pairs || 'BTC-EUR,ETH-EUR' }} \
            --capital ${{ inputs.capital || '10000' }} \
            --risk-levels ${{ inputs.risk_levels || 'conservative,moderate,aggressive' }} \
            --log-level ${{ inputs.log_level || 'WARNING' }} 2>&1 | tee backtest-output.txt

      - name: Generate timestamped filename
        id: filename
        run: echo "name=backtest-$(date -u +'%Y-%m-%d_%H-%M-%S').txt" >> "$GITHUB_OUTPUT"

      - name: Rename output with timestamp
        run: cp backtest-output.txt "${{ steps.filename.outputs.name }}"

      - name: Post results to job summary
        if: always()
        run: |
          # Extract the comparison table
          START=$(grep -n "STRATEGY COMPARISON" backtest-output.txt | head -1 | cut -d: -f1)
          if [ -n "$START" ]; then
            START=$((START - 1))
            TABLE=$(tail -n +"$START" backtest-output.txt)
          else
            TABLE="No backtest results found."
          fi

          {
            echo "## Backtest Matrix Report"
            echo ""
            echo "**Parameters:** strategies=${{ inputs.strategies || 'all' }} · days=${{ inputs.days || '30' }} · interval=${{ inputs.interval || '60' }}min · pairs=${{ inputs.pairs || 'BTC-EUR,ETH-EUR' }} · capital=€${{ inputs.capital || '10000' }} · risk=${{ inputs.risk_levels || 'conservative,moderate,aggressive' }}"
            echo ""
            echo '```'
            echo "$TABLE"
            echo '```'
            echo ""
            echo "*Real market data via Revolut X API (int environment)*"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backtest output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backtest-results
          path: ${{ steps.filename.outputs.name }}
          retention-days: 30
