name: Backtest Matrix

# Runs the full strategy × risk level matrix backtest (identical to make backtest-matrix)
# when a PR targets main (int → prod promotion).
# Uses ENVIRONMENT=int with real Revolut X API to fetch actual market data.
# Posts the comparison table as a PR comment.
#
# Required GitHub secret:
#   OP_SERVICE_ACCOUNT_TOKEN — 1Password service account token with read access
#                              to the revolut-trader vault (int credentials).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  ENVIRONMENT: int
  PYTHON_VERSION: "3.11"

jobs:
  backtest-matrix:
    name: Backtest Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install 1Password CLI
        run: |
          curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
            sudo gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" | \
            sudo tee /etc/apt/sources.list.d/1password.list
          sudo apt-get update -qq && sudo apt-get install -y -qq 1password-cli

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Run backtest matrix
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          uv run python cli/backtest_compare.py \
            --days 30 --interval 60 \
            --pairs BTC-EUR,ETH-EUR \
            --capital 10000 \
            --risk-levels conservative,moderate,aggressive \
            --log-level WARNING 2>&1 | tee backtest-output.txt

      - name: Post results as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Extract the comparison table (from "====...STRATEGY COMPARISON" to end)
          TABLE=$(sed -n '/^=.*STRATEGY COMPARISON/,$ p' backtest-output.txt)

          # Build comment body
          {
            echo "## Backtest Matrix Report"
            echo ""
            echo '```'
            echo "$TABLE"
            echo '```'
            echo ""
            echo "*Real market data via Revolut X API (int) · 30 days · 60 min candles · €10,000 capital*"
          } > report.md

          # Delete previous backtest comment if it exists
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("## Backtest Matrix Report")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api -X DELETE "repos/$REPO/issues/comments/$COMMENT_ID"
          fi

          # Post new comment
          gh pr comment "$PR_NUMBER" --body-file report.md
