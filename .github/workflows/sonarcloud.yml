name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  ENVIRONMENT: int
  PYTHON_VERSION: "3.11"

jobs:
  sonarcloud:
    name: Code Scanning
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --extra dev

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src
          --cov-report=xml:coverage.xml
          -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=badoriie
            -Dsonar.projectKey=badoriie_revolut-trader
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=src/,cli/
            -Dsonar.tests=tests/
            -Dsonar.coverage.exclusions=cli/**
            -Dsonar.python.version=${{ env.PYTHON_VERSION }}
            -Dsonar.qualitygate.wait=true

      - name: Fetch SonarCloud issues report
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PROJECT_KEY="badoriie_revolut-trader"
          API_URL="https://sonarcloud.io/api"
          PAGE=1
          PAGE_SIZE=100
          ALL_ISSUES="[]"

          # Set branch filter: PR number for pull_request events, branch name for push
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BRANCH_PARAM="pullRequest=${PR_NUMBER}"
          else
            BRANCH_PARAM="branch=main"
          fi

          # Paginate through all issues
          while true; do
            RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" \
              "${API_URL}/issues/search?componentKeys=${PROJECT_KEY}&${BRANCH_PARAM}&statuses=OPEN,CONFIRMED,REOPENED&ps=${PAGE_SIZE}&p=${PAGE}")

            ISSUES=$(echo "$RESPONSE" | jq '.issues')
            TOTAL=$(echo "$RESPONSE" | jq '.total')
            COUNT=$(echo "$ISSUES" | jq 'length')

            ALL_ISSUES=$(echo "$ALL_ISSUES" "$ISSUES" | jq -s '.[0] + .[1]')

            if [ $((PAGE * PAGE_SIZE)) -ge "$TOTAL" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          ISSUE_COUNT=$(echo "$ALL_ISSUES" | jq 'length')
          echo "Total issues found: $ISSUE_COUNT"

          # Save full JSON report
          echo "$ALL_ISSUES" | jq '.' > sonarcloud-issues.json

          # Generate markdown report
          {
            echo "# SonarCloud Issues Report"
            echo ""
            echo "**Project:** ${PROJECT_KEY}"
            echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "**Total issues:** ${ISSUE_COUNT}"
            echo ""

            # Summary by severity
            echo "## Summary by Severity"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            for SEV in BLOCKER CRITICAL MAJOR MINOR INFO; do
              C=$(echo "$ALL_ISSUES" | jq "[.[] | select(.severity == \"${SEV}\")] | length")
              if [ "$C" -gt 0 ]; then
                echo "| ${SEV} | ${C} |"
              fi
            done
            echo ""

            # Summary by type
            echo "## Summary by Type"
            echo ""
            echo "| Type | Count |"
            echo "|------|-------|"
            for TYPE in BUG VULNERABILITY CODE_SMELL; do
              C=$(echo "$ALL_ISSUES" | jq "[.[] | select(.type == \"${TYPE}\")] | length")
              if [ "$C" -gt 0 ]; then
                echo "| ${TYPE} | ${C} |"
              fi
            done
            echo ""

            # Detailed issues list
            echo "## Issues"
            echo ""
            echo "| # | Severity | Type | Rule | File | Line | Message |"
            echo "|---|----------|------|------|------|------|---------|"
            echo "$ALL_ISSUES" | jq -r '
              sort_by(
                if .severity == "BLOCKER" then 0
                elif .severity == "CRITICAL" then 1
                elif .severity == "MAJOR" then 2
                elif .severity == "MINOR" then 3
                else 4 end
              ) | to_entries[] |
              "| \(.key + 1) | \(.value.severity) | \(.value.type) | \(.value.rule) | \(.value.component | split(":")[1] // .value.component) | \(.value.line // "-") | \(.value.message | gsub("\\|"; "∣") | gsub("\n"; " ")) |"
            '
          } > sonarcloud-issues.md

          # Write to GitHub Actions job summary
          cat sonarcloud-issues.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SonarCloud issues report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sonarcloud-issues-report
          path: |
            sonarcloud-issues.md
            sonarcloud-issues.json
          retention-days: 30
