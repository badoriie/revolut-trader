name: Analytics Report

# Manual workflow — runs a quick backtest matrix to populate the DB, then
# generates a comprehensive analytics report with charts.
#
# Required GitHub secret:
#   OP_SERVICE_ACCOUNT_TOKEN — 1Password service account token with read access
#                              to the revolut-trader vault (int credentials).
#
# The report.md is posted to the GitHub Actions job summary.
# Chart PNGs and the full report are uploaded as build artifacts.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Look-back window in days for live-trading analytics"
        required: false
        default: "30"
        type: choice
        options:
          - "7"
          - "14"
          - "30"
          - "60"
          - "90"
      backtest_days:
        description: "Days of historical data for the backtest run (populates DB)"
        required: false
        default: "7"
        type: choice
        options:
          - "7"
          - "14"
          - "30"
      strategies:
        description: "Strategies to backtest (comma-separated, or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - market_making
          - momentum
          - mean_reversion
          - multi_strategy
          - breakout
          - range_reversion
      risk_levels:
        description: "Risk levels to include in the backtest"
        required: false
        default: "conservative,moderate,aggressive"
        type: choice
        options:
          - conservative,moderate,aggressive
          - conservative
          - moderate
          - aggressive
      pairs:
        description: "Trading pairs (comma-separated)"
        required: false
        default: "BTC-EUR,ETH-EUR"
        type: string
      capital:
        description: "Initial capital in EUR for the backtest"
        required: false
        default: "10000"
        type: string

permissions:
  contents: read

env:
  ENVIRONMENT: int
  PYTHON_VERSION: "3.11"

jobs:
  analytics-report:
    name: Analytics Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install 1Password CLI
        run: |
          set -euo pipefail
          curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
            sudo gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" | \
            sudo tee /etc/apt/sources.list.d/1password.list
          sudo apt-get update -qq && sudo apt-get install -y -qq 1password-cli

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (including analytics extras)
        run: uv sync --extra dev --extra analytics

      - name: Build backtest strategy arguments
        id: args
        run: |
          STRATEGIES="${{ inputs.strategies }}"
          if [ "$STRATEGIES" = "all" ] || [ -z "$STRATEGIES" ]; then
            echo "strategies_arg=" >> "$GITHUB_OUTPUT"
          else
            echo "strategies_arg=--strategies $STRATEGIES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run backtest matrix (populates database)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          uv run python cli/backtest_compare.py \
            ${{ steps.args.outputs.strategies_arg }} \
            --days ${{ inputs.backtest_days || '7' }} \
            --interval 60 \
            --pairs ${{ inputs.pairs || 'BTC-EUR,ETH-EUR' }} \
            --capital ${{ inputs.capital || '10000' }} \
            --risk-levels ${{ inputs.risk_levels || 'conservative,moderate,aggressive' }} \
            --log-level WARNING 2>&1 | tee backtest-output.txt

      - name: Generate analytics report
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p data/reports
          uv run python cli/analytics_report.py \
            --days ${{ inputs.days || '30' }} \
            --output-dir data/reports 2>&1 | tee analytics-output.txt

      - name: Post analytics report to job summary
        if: always()
        run: |
          REPORT="data/reports/report.md"
          if [ -f "$REPORT" ]; then
            {
              echo "## Analytics Report"
              echo ""
              echo "**Parameters:** days=${{ inputs.days || '30' }} · backtest_days=${{ inputs.backtest_days || '7' }} · pairs=${{ inputs.pairs || 'BTC-EUR,ETH-EUR' }} · capital=€${{ inputs.capital || '10000' }} · risk=${{ inputs.risk_levels || 'conservative,moderate,aggressive' }}"
              echo ""
              cat "$REPORT"
              echo ""
              echo "---"
              echo "*Real market data via Revolut X API (int environment)*"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Analytics Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Report generation failed. Check the workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post backtest comparison to job summary
        if: always()
        run: |
          START=$(grep -n "STRATEGY COMPARISON" backtest-output.txt 2>/dev/null | head -1 | cut -d: -f1)
          if [ -n "$START" ]; then
            START=$((START - 1))
            TABLE=$(tail -n +"$START" backtest-output.txt)
            {
              echo ""
              echo "## Backtest Matrix (used to populate database)"
              echo ""
              echo '```'
              echo "$TABLE"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload analytics report and charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: analytics-report-${{ github.run_number }}
          path: data/reports/
          retention-days: 30

      - name: Upload backtest output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backtest-output-${{ github.run_number }}
          path: backtest-output.txt
          retention-days: 30
